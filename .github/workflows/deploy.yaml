name: Deploy to PyPI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-observatory
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  push-rag-artifacts:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RAG_ARTIFACTS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Push md and puml files to S3
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          S3_PREFIX="s3://expertise-rag-artifacts-239571291755-prod/raw/${REPO_NAME}"
          find . -not -path './.git/*' \( -name '*.md' -o -name '*.puml' \) | while read -r file; do
            aws s3 cp "$file" "${S3_PREFIX}/${file#./}"
          done
